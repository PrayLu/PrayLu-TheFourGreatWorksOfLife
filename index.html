<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>人生四大作品 · 趣味人格测试</title>
    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            --bg-body: #0b0614;
            --text-main: #eee9ff;
            --container-bg: #120a22;
            --container-border: #2a1b47;
            --title-grad-1: #d6c5ff;
            --title-grad-2: #9f7cff;
            --sub-color: #c8b8f2;
            --sub-border: #3a2a5f;
            --progress-bg: #24153f;
            --progress-fill: #8b5cf6;
            --counter-color: #c5b4ef;
            --card-bg: #1a1030;
            --card-border: #342359;
            --question-color: #f2edff;
            --option-bg: #21133a;
            --option-border: #433069;
            --option-hover-bg: #2b1a49;
            --option-hover-border: #8b5cf6;
            --option-selected-bg: #36205f;
            --option-selected-border: #a78bfa;
            --option-selected-shadow: rgba(139,92,246,0.4);
            --btn-bg: #2f1e50;
            --btn-text: #ece6ff;
            --btn-primary-bg: #7c3aed;
            --btn-primary-hover-bg: #6d28d9;
            --result-bg: #19102f;
            --result-border: #3a2863;
            --emoji-bg: #2a1b47;
            --quote-color: #d3c3ff;
            --quote-border: #8f6be8;
            --desc-bg: #21153b;
            --dim-bg: #281a45;
            --restart-bg: #6741c9;
            --disclaimer-color: #ccbaf7;
            --disclaimer-bg: #201338;
            --footer-color: #ab95df;
        }
        body.theme-light {
            --bg-body: #f6f1ff;
            --text-main: #2d2345;
            --container-bg: #fdfbff;
            --container-border: #ddd2f6;
            --title-grad-1: #8b5cf6;
            --title-grad-2: #6d28d9;
            --sub-color: #7d68a8;
            --sub-border: #d9cfff;
            --progress-bg: #e7defa;
            --progress-fill: #8b5cf6;
            --counter-color: #78639d;
            --card-bg: #f8f4ff;
            --card-border: #e2d8fb;
            --question-color: #342457;
            --option-bg: #ffffff;
            --option-border: #d6c7f2;
            --option-hover-bg: #f1e9ff;
            --option-hover-border: #a78bfa;
            --option-selected-bg: #e7dbff;
            --option-selected-border: #8b5cf6;
            --option-selected-shadow: rgba(139,92,246,0.25);
            --btn-bg: #dbcdfa;
            --btn-text: #322552;
            --btn-primary-bg: #7c3aed;
            --btn-primary-hover-bg: #6d28d9;
            --result-bg: #f7f1ff;
            --result-border: #e1d2ff;
            --emoji-bg: #ece2ff;
            --quote-color: #7352a8;
            --quote-border: #b69bff;
            --desc-bg: #f4ecff;
            --dim-bg: #e7dcff;
            --restart-bg: #c4b1f6;
            --disclaimer-color: #7a62a6;
            --disclaimer-bg: #f2eaff;
            --footer-color: #8f79b8;
        }
        body {
            background: var(--bg-body);
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', 'PingFang SC', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }
        .container {
            max-width: 760px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 48px 28px 48px 28px;
            box-shadow: 0 25px 40px -16px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 24px 22px 36px;
            border: 1px solid var(--container-border);
        }
        .theme-switch-wrap {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .theme-switch-btn {
            border-radius: 999px;
            padding: 7px 14px;
            font-size: 0.82rem;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--container-border);
            min-height: auto;
        }
        h1 {
            font-size: 1.9rem;
            text-align: center;
            margin: 0 0 6px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--title-grad-1), var(--title-grad-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            color: var(--sub-color);
            border-bottom: 1px dashed var(--sub-border);
            padding-bottom: 14px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .cover-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 24px 18px;
            margin: 14px 0 18px;
            text-align: center;
        }
        .cover-emoji {
            font-size: 3rem;
            margin-bottom: 8px;
        }
        .cover-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--question-color);
            margin-bottom: 8px;
        }
        .cover-desc {
            font-size: 0.92rem;
            line-height: 1.6;
            color: var(--sub-color);
            margin-bottom: 14px;
        }
        .cover-points {
            text-align: left;
            background: var(--container-bg);
            border: 1px solid var(--container-border);
            border-radius: 14px;
            padding: 10px 12px;
            font-size: 0.84rem;
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .cover-point {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
        }
        .cover-point + .cover-point {
            border-top: 1px dashed var(--sub-border);
        }
        .cover-point-icon {
            width: 20px;
            height: 20px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--btn-primary-bg), var(--btn-primary-hover-bg));
            color: #fff;
            font-size: 0.72rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .cover-start-btn {
            width: 100%;
        }
        .progress-area {
            background: var(--progress-bg);
            border-radius: 40px;
            height: 10px;
            margin: 12px 0 8px;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--progress-fill);
            border-radius: 40px;
            transition: width 0.2s;
        }
        .q-counter {
            text-align: right;
            font-size: 0.8rem;
            color: var(--counter-color);
            margin: 8px 0 6px;
        }
        .question-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px 20px;
            margin: 16px 0 22px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.03);
            border: 1px solid var(--card-border);
        }
        .question-text {
            font-size: 1.4rem;
            font-weight: 560;
            line-height: 1.4;
            margin-bottom: 28px;
            color: var(--question-color);
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            background: var(--option-bg);
            border-radius: 60px;
            padding: 10px 18px;
            border: 1px solid var(--option-border);
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        .option:hover {
            background: var(--option-hover-bg);
            border-color: var(--option-hover-border);
        }
        .option.selected {
            background: var(--option-selected-bg);
            border-color: var(--option-selected-border);
            box-shadow: inset 0 1px 2px #00000008, 0 2px 8px var(--option-selected-shadow);
        }
        .option-prefix {
            font-size: 1.2rem;
            width: 30px;
            text-align: center;
            font-weight: 600;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 12px;
        }
        button {
            background: var(--btn-bg);
            border: none;
            padding: 10px 22px;
            border-radius: 48px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: var(--btn-text);
        }
        button.primary {
            background: var(--btn-primary-bg);
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        button.primary:hover {
            background: var(--btn-primary-hover-bg);
        }
        .result-box {
            background: var(--result-bg);
            border-radius: 36px;
            padding: 26px 22px;
            margin-top: 20px;
            text-align: center;
            border: 2px solid var(--result-border);
        }
        .result-main {
            max-width: 640px;
            margin: 0 auto;
        }
        .personality-emoji {
            font-size: 4rem;
            background: var(--emoji-bg);
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 100px;
            margin: 0 auto 16px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .result-name {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--title-grad-1), var(--title-grad-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 8px 0 6px;
        }
        .result-quote {
            font-size: 1.05rem;
            font-style: italic;
            color: var(--quote-color);
            margin: 8px 0 14px;
            border-left: 3px solid var(--quote-border);
            padding-left: 14px;
            text-align: left;
        }
        .result-desc {
            background: var(--desc-bg);
            padding: 18px;
            border-radius: 28px;
            text-align: left;
            line-height: 1.65;
            margin: 16px 0 12px;
            font-size: 0.95rem;
        }
        .dimension-scores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
            background: var(--dim-bg);
            padding: 12px;
            border-radius: 18px;
            font-size: 0.82rem;
            text-align: left;
        }
        .dimension-scores span {
            background: var(--container-bg);
            border: 1px solid var(--container-border);
            border-radius: 12px;
            padding: 8px 10px;
        }
        .restart-btn {
            background: var(--restart-bg);
            margin-top: 20px;
            width: 100%;
            font-weight: bold;
        }
        .share-card-btn {
            width: 100%;
            margin-top: 10px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--container-border);
        }
        .share-card-btn.loading {
            opacity: 0.8;
            cursor: not-allowed;
        }
        .share-loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 5, 14, 0.52);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 18px;
        }
        .share-loading-box {
            min-width: 250px;
            max-width: 340px;
            border-radius: 18px;
            border: 1px solid var(--container-border);
            background: var(--container-bg);
            color: var(--text-main);
            text-align: center;
            padding: 18px 16px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.25);
        }
        .share-loading-spinner {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 3px solid rgba(255,255,255,0.18);
            border-top-color: var(--progress-fill);
            margin: 0 auto 10px;
            animation: shareSpin 0.9s linear infinite;
        }
        .share-loading-title {
            font-size: 0.98rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .share-loading-sub {
            font-size: 0.86rem;
            color: var(--sub-color);
        }
        @keyframes shareSpin {
            to { transform: rotate(360deg); }
        }
        .result-actions-guide {
            margin-top: 14px;
            text-align: left;
            background: var(--desc-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 12px 14px;
            line-height: 1.55;
            font-size: 0.88rem;
        }
        .result-actions-guide strong {
            color: var(--question-color);
        }
        .disclaimer-note {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 24px;
            color: var(--disclaimer-color);
            background: var(--disclaimer-bg);
            padding: 8px;
            border-radius: 60px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 28px;
            color: var(--footer-color);
        }
        @media (max-width: 768px) {
            .theme-switch-wrap {
                margin-bottom: 6px;
            }
            .theme-switch-btn {
                font-size: 0.76rem;
                padding: 6px 12px;
            }
            body {
                padding: 14px;
            }
            .container {
                border-radius: 28px 20px 28px 20px;
                padding: 18px 16px 24px;
            }
            h1 {
                font-size: 1.55rem;
            }
            .sub {
                font-size: 0.82rem;
                margin-bottom: 16px;
                padding-bottom: 10px;
            }
            .question-card {
                border-radius: 24px;
                padding: 18px 14px;
                margin: 12px 0 16px;
            }
            .cover-panel {
                border-radius: 22px;
                padding: 16px 12px;
                margin: 10px 0 14px;
            }
            .cover-title {
                font-size: 1.05rem;
            }
            .cover-desc {
                font-size: 0.84rem;
                margin-bottom: 10px;
            }
            .cover-points {
                font-size: 0.78rem;
                margin-bottom: 10px;
            }
            .question-text {
                font-size: 1.16rem;
                margin-bottom: 18px;
            }
            .option {
                min-height: 52px;
                padding: 12px 14px;
                border-radius: 18px;
                align-items: flex-start;
            }
            .option-prefix {
                width: 24px;
                font-size: 1rem;
                margin-top: 1px;
            }
            button {
                min-height: 46px;
                padding: 10px 16px;
                border-radius: 14px;
                font-size: 0.92rem;
            }
            .result-box {
                border-radius: 24px;
                padding: 18px 14px;
            }
            .result-name {
                font-size: 1.5rem;
            }
            .result-desc {
                border-radius: 16px;
                font-size: 0.92rem;
                padding: 14px;
            }
            .dimension-scores {
                border-radius: 18px;
                gap: 8px;
                font-size: 0.78rem;
                padding: 10px;
            }
            .disclaimer-note {
                font-size: 0.74rem;
                line-height: 1.45;
                border-radius: 14px;
            }
        }
        @media (max-width: 520px) {
            .theme-switch-btn {
                font-size: 0.72rem;
                padding: 5px 10px;
            }
            body {
                padding: 10px;
            }
            .container {
                padding: 14px 12px 18px;
                border-radius: 20px 14px 20px 14px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .sub {
                font-size: 0.76rem;
                margin-bottom: 12px;
            }
            .q-counter {
                font-size: 0.74rem;
                margin: 6px 0 4px;
            }
            .question-text {
                font-size: 1.02rem;
                line-height: 1.5;
            }
            .options {
                gap: 8px;
            }
            .option {
                min-height: 48px;
                padding: 10px 12px;
                gap: 8px;
                font-size: 0.9rem;
            }
            .nav-buttons {
                gap: 8px;
            }
            .nav-buttons button {
                flex: 1;
            }
            #submitBtn {
                margin-top: 12px !important;
            }
            .personality-emoji {
                width: 82px;
                height: 82px;
                line-height: 82px;
                font-size: 3rem;
            }
            .result-name {
                font-size: 1.28rem;
            }
            .result-quote {
                font-size: 0.92rem;
                padding-left: 10px;
            }
            .result-actions-guide {
                font-size: 0.82rem;
                border-radius: 14px;
                padding: 10px 12px;
            }
            .dimension-scores {
                display: grid;
                grid-template-columns: 1fr;
                width: 100%;
            }
            .restart-btn {
                margin-top: 14px;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="theme-switch-wrap">
        <button id="themeToggleBtn" class="theme-switch-btn" type="button">切换到浅色版</button>
    </div>
    <div id="quizHeader" style="display:none;">
        <h1>📜 人生四大作品 · 趣味人格测试</h1>
        <div class="sub">事业 · 家庭 · 子女 · 健康 | 轻松作答 发现你的生活风格</div>
    </div>
    <div id="coverPanel" class="cover-panel">
        <div class="cover-emoji">🎭</div>
        <div class="cover-title">欢迎来到「人生四大作品人格测试」</div>
        <div class="cover-desc">全程轻松作答，看看你在事业、家庭、子女、健康四个维度的风格画像。</div>
        <div class="cover-points">
            <div class="cover-point"><span class="cover-point-icon">1</span><span>共 30 题，约 5 分钟完成</span></div>
            <div class="cover-point"><span class="cover-point-icon">2</span><span>每题四个选项，按直觉选更准</span></div>
            <div class="cover-point"><span class="cover-point-icon">3</span><span>结果可截图分享，也可反复解锁新人格</span></div>
        </div>
        <button id="startBtn" class="primary cover-start-btn">开始测试</button>
    </div>
    <div id="quizPanel" style="display:none;">
        <div class="progress-area"><div class="progress-bar" id="progressBar"></div></div>
        <div class="q-counter" id="qCounter">第1 / 30题</div>
        <div class="question-card" id="questionCard">
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
        </div>
        <div class="nav-buttons">
            <button id="prevBtn">◀ 上一题</button>
            <button id="nextBtn" class="primary">下一题 ▶</button>
        </div>
        <button id="submitBtn" class="primary" style="display:none; width:100%; margin-top:18px;">✨ 查看我的人格 ✨</button>
    </div>
    <div id="resultPanel" style="display:none;"></div>
    <div class="disclaimer-note">若你尚未结婚或生子，不妨放飞想象作答。</div>
    <footer>⚡ 趣味解读 · 人生四大作品 ⚡ · ⚡ 个人战略探索出品 ⚡</footer>
</div>

<script>
    // ==================== 趣味题目（无提前触发结束，所有题目必答） ====================
    const questionsData = [
        // 事业 7题
        { text: "周一早上闹钟响了，你第一反应是？", options: [{text:"鲤鱼打挺起床，今天要开周会",score:2},{text:"按掉闹钟再眯5分钟，然后极速出门",score:1},{text:"请半天假，下午再去",score:0},{text:"把闹钟关掉，发消息“老板我发烧了”",score:0}], dim:"career" },
        { text: "领导在群里发了一个60秒语音方阵，你会？", options: [{text:"逐条听完，并回复“收到，落实”",score:2},{text:"转文字，大概扫一眼",score:1},{text:"假装没看到，等别人先回",score:0},{text:"回复“好的”，然后继续刷短视频",score:1}], dim:"career" },
        { text: "开会时你突然放了个屁，声音不大但旁边人都听到了，你会？", options: [{text:"面不改色，继续讲PPT",score:2},{text:"假装咳嗽两声掩盖",score:1},{text:"脸红到耳朵根，想找个地缝",score:0},{text:"指着旁边的同事说“你中午吃了啥”",score:0}], dim:"career" },
        { text: "公司团建要爬山，你的真实想法是？", options: [{text:"太好了，正好展示我的体能",score:2},{text:"能不去就不去，但不好意思请假",score:1},{text:"直接说“我膝盖不好”",score:0},{text:"去了然后全程坐缆车在山顶等大家",score:1}], dim:"career" },
        { text: "如果多年后回头看，你最怕事业成功是靠什么换来的？", options: [{text:"怕错过家人的重要时刻",score:2},{text:"怕把自己活成工作机器",score:1},{text:"没想过太多，把眼前的事做完再说",score:0},{text:"我很想赢，也愿意为结果多投入一些",score:0}], dim:"career" },
        { text: "老板说“这个项目大家自愿加班”，你会？", options: [{text:"主动留下，并问“还有啥我能做的”",score:2},{text:"看别人留不留，随大流",score:1},{text:"准时走，并说“家里有事”",score:0},{text:"走之前给老板发一份“加班费申请模板”",score:0}], dim:"career" },
        { text: "说实话，你现在的事业，主要是在为谁而做？", options: [{text:"为自己：做的是我真正想做的事",score:1},{text:"为家人：想让家里过得更稳、更好",score:1},{text:"为现实：房贷、开销、责任推着我走",score:0},{text:"为他人：希望创造价值，做对别人有益的事",score:2}], dim:"career" },
        // 家庭 7题
        { text: "伴侣问你“我胖了吗”，你的标准答案是？", options: [{text:"“没有，你一直都好看”",score:2},{text:"“有一点点，但我也胖了”",score:1},{text:"沉默5秒，然后说“你开心就好”",score:0},{text:"打开手机前置摄像头递过去：“你自己看”",score:0}], dim:"family" },

       // 一、均衡型（4种）
     { name:"中庸本庸", career:"M", family:"M", children:"M", health:"M", emoji:"⚖️", quote:"子曰：过犹不及，差不多就行。", desc:"你是朋友圈里那个‘刚刚好’的人——事业不卷不躺，家庭不冷不热，孩子成绩中等，体检报告有几个箭头但不慌。你不争不抢，但也不掉队；你不温不火，但也不冷战。朋友说你稳，其实你知道，稳是因为你找到了自己的节奏。这年头能稳住不崩的都是狠人，你这种‘差不多’的智慧，恰恰是最难得的平衡。继续保持，你就是大家心中的定海神针。" },
    { name:"人生赢家", career:"H", family:"H", children:"H", health:"H", emoji:"💪", quote:"《周易》：天行健，君子自强不息。", desc:"你就是那个‘别人家的孩子’长大了的样子——事业风生水起，家庭和睦美满，孩子优秀省心，身体倍儿棒。你活成了很多人羡慕的模样，这背后是你日复一日的努力和自律。不过悄悄问一句，你上次睡够8小时是什么时候？你已经很棒了，但完美不是永动机，偶尔松一松弦，声音反而更好听。你已经赢了，可以歇一歇了。" },
    { name:"四大皆空", career:"L", family:"L", children:"L", health:"L", emoji:"🍃", quote:"六祖惠能：本来无一物，何处惹尘埃。", desc:"你活得很通透——事业随缘、家庭随缘、子女随缘、健康随缘。你不争不抢，不焦虑不内耗，是朋友圈里那个‘最让人羡慕的佛系代表’。你活成了庄子，但庄周还知道做梦，你连梦都懒得做，这份松弛感真的很难得。不过话说回来，房贷还是要还的，孩子学费还是要交的——在‘随缘’的基础上，稍微‘随’一下该做的事，就能躺得更安心。" },
    { name:"潜龙在渊", career:"M", family:"M", children:"M", health:"H", emoji:"🐉", quote:"《易经》：潜龙勿用，养精蓄锐。", desc:"你表面平平无奇，像个普通中年人——事业还行、家庭凑合、孩子不差。但你的体检报告出卖了你：各项指标优秀得像20岁小伙。你偷偷晨跑、偷偷吃轻食、偷偷早睡，同事以为你佛系，其实你在下一盘大棋——活得比谁都久。你是朋友圈里的‘隐形卷王’，卷的不是事业，是寿命。别人卷到住院，你卷到领养老金，这波你在大气层。" },

      // 二、事业偏科型（12种）
    { name:"工作狂魔", career:"H", family:"M", children:"M", health:"M", emoji:"💼", quote:"《庄子》：吾生也有涯，而加班也无涯。", desc:"你对工作的投入让人佩服，老板把你当左膀右臂，同事把你当定心丸。你是一个值得信赖的人，这份责任感很珍贵。不过你最近一次和家人好好吃顿饭是什么时候？窗外的阳光也值得你看一眼，老板不会因为你少加一天班就破产。你已经做得很好了，偶尔慢下来，世界不会塌。" },
    { name:"逐浪行者", career:"H", family:"L", children:"L", health:"L", emoji:"🐍", quote:"《孟子》：三过家门而不入，未必是长久之道。", desc:"你是职场的弄潮儿，事业蒸蒸日上，能力出众。你正在为家人创造更好的未来，这份心意值得尊重。不过也许可以偶尔停下来问问自己：上次和家人聊聊天是什么时候？事业是长跑，陪伴也是。你不需要停下脚步，只需要偶尔回头看看，他们一直在等你。" },
    { name:"职场孤狼", career:"H", family:"M", children:"L", health:"L", emoji:"🐺", quote:"《孟子》：虽千万人吾往矣。", desc:"你是一个很有能力的人，事业上独当一面，是团队里的核心力量。你习惯了独自承担，这份担当很了不起。不过英雄也需要一个拥抱，今天早点回家，哪怕只是吃顿饭、聊几句。你不必什么都一个人扛，家人和朋友，都愿意做你的后盾。" },
    { name:"拼命三郎", career:"H", family:"M", children:"M", health:"L", emoji:"🔥", quote:"诸葛亮《出师表》：鞠躬尽瘁，全力以赴。", desc:"你是老板最信任的人，项目交给你大家都放心。你是一个极其靠谱的人，这份责任感很难得。不过你的身体已经在悄悄提醒你了——脂肪肝、高血压、颈椎病，这些都是‘太拼’的勋章。留得青山在，不怕没柴烧，你已经足够好了，可以对自己温柔一点了。" },
    { name:"铁躯孤灯", career:"H", family:"L", children:"L", health:"H", emoji:"🏋️", quote:"身体是革命的本钱，也别忘了把本钱投向家人。", desc:"你是一个极度自律的人，每天五公里、体脂率让年轻人羡慕。你把身体管理到了极致，这份毅力用在哪儿都能成事。不过也许可以偶尔把‘健身日’改成‘家庭日’——肌肉和亲情，都是需要‘练’的。你已经有了一副好身体，接下来可以练练陪伴了。" },
    { name:"老板的好驴", career:"H", family:"M", children:"M", health:"M", emoji:"🫏", quote:"诸葛亮《后出师表》：鞠躬尽瘁，也别忘了照顾自己。", desc:"你是公司里的老黄牛，任劳任怨，从不说no。你的靠谱和踏实，是团队里最珍贵的品质。不过你以为你是公司的功臣，其实你更是自己的主人。拉磨也要吃草，给自己留点时间体检、陪家人、喘口气。你已经很努力了，值得被好好对待——首先是被你自己。" },
    { name:"伪成功人士", career:"H", family:"L", children:"H", health:"L", emoji:"👑", quote:"俗语：光宗耀祖，也要顾好当下生活。", desc:"你的事业风生水起，孩子成绩顶尖，你是一个很有能力的人。但你最近和另一半好好聊过天吗？你的身体还好吗？面子已经有了，里子也需要照顾一下。你已经很成功了，接下来可以把‘成功’的定义稍微调整一下——包括一段舒服的关系，和一个健康的身体。" },
    { name:"职场咸鱼", career:"L", family:"M", children:"M", health:"M", emoji:"🐟", quote:"《庄子》：子非鱼，安知鱼之不乐？", desc:"你的人生信条是：能少干绝不多干，能推活绝不接活。你是职场里的‘清流’，不卷不争，活得轻松自在。你的家庭和谐，身体还行，日子过得舒服。咸鱼也有咸鱼的快乐，知足常乐是你的人生智慧。不过别咸到发臭就行——偶尔翻个身，晒晒太阳，也是咸鱼的修养。" },
    { name:"佛系上班", career:"L", family:"H", children:"H", health:"H", emoji:"🙏", quote:"《金刚经》：应无所住，而生其心。", desc:"你的工作只是副业，家庭和健康才是你的主业。你准时下班、拒绝加班、周末不回消息，把时间全给了家人和自己。你是职场里的‘异类’，但你是生活里的‘状元’。你把生活过成了诗，工作只是点缀。你已经找到了人生的正确答案，继续保持，你活成了很多人想成为的样子。" },
    { name:"躺平先驱", career:"L", family:"M", children:"L", health:"M", emoji:"🛌", quote:"《道德经》：无为而治。", desc:"能躺着绝不坐着，能坐着绝不站着——这是你的人生哲学。你是躺平界的OG，是佛系圈的祖师爷。你的躺平姿势已经炉火纯青，这份松弛感让人羡慕。不过小心躺太久腰会疼，偶尔坐起来看看世界也没坏处。躺平是一种态度，但别躺到起不来——你还有很长的日子要过。" },
    { name:"养老预备役", career:"L", family:"M", children:"M", health:"H", emoji:"👴", quote:"陶渊明：采菊东篱下，悠然见南山。", desc:"你虽然还没到退休年龄，但精神上已经退了。你每天盘算的是退休金够不够，养生食谱怎么搭，哪个公园的太极拳教得好。你的身体是30岁，心态是60岁。心态年轻比什么都重要，但别太急着变老——该拼的时候还是可以拼一下，人生还有很多可能性等着你。" },
    { name:"职场透明人", career:"L", family:"L", children:"L", health:"M", emoji:"👻", quote:"《道德经》：视之不见，名曰夷。", desc:"你是公司的幽灵员工，存在感为负，但工资从不迟到。你的家庭也差不多——你的另一半当你空气，孩子当你提款机。你活成了《哈利波特》里的幽灵，看得见摸不着。低调是福，闷声发大财。但偶尔也要刷一下存在感，否则真被忘了。你已经很低调了，接下来可以稍微‘高调’一点点。" },

    { name:"家族族长", career:"H", family:"H", children:"L", health:"M", emoji:"🏮", quote:"《礼记》：齐家治国。", desc:"你是家族里的主心骨，亲戚找你，家族聚会你坐主桌，父母看病你陪。你的事业也搞得风生水起，家里大事小情一把抓。你是大家的依靠，这份担当很了不起。不过你的血压已经快到临界值了——操心太多。管好自己才能管好家族，先去体检，再去度假。家族没有你照样转，但你需要自己。" },
    { name:"妻管严晚期", career:"M", family:"H", children:"M", health:"L", emoji:"🙇", quote:"爱人永远是对的。", desc:"你的事业一般般，但你的家庭地位为负——工资全上交，零花钱按粒算。你的孩子已经学会了你的‘认怂保平安’哲学。你的家庭幸福感来自爱人的‘允许’，这份温柔和包容很可贵。不过怕爱人会发达，但也要注意自己的啤酒肚和小心脏。偶尔硬气一回也没事，你值得被听见。" },

    const soundFx = {
        ctx: null,
        isUnlocked: false
    };

    function ensureAudioContext() {
        if (!soundFx.ctx) {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return null;
            soundFx.ctx = new AudioCtx();
        }
        return soundFx.ctx;
    }

    function unlockAudioContext() {
        const ctx = ensureAudioContext();
        if (!ctx) return;
        if (ctx.state === "suspended") {
            ctx.resume();
        }
        soundFx.isUnlocked = true;
    }

    function playOptionHoverSound() {
        const ctx = ensureAudioContext();
        if (!ctx || !soundFx.isUnlocked) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(620, now);
        osc.frequency.exponentialRampToValueAtTime(760, now + 0.045);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.032, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.07);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.075);
    }

    function playOptionClickSound() {
        const ctx = ensureAudioContext();
        if (!ctx || !soundFx.isUnlocked) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        // 更自然的确认音：柔和起音 + 轻微下滑
        osc.type = "sine";
        osc.frequency.setValueAtTime(720, now);
        osc.frequency.exponentialRampToValueAtTime(560, now + 0.12);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.05, now + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.145);
    }

        currentTheme = isLight ? "light" : "deep";
        localStorage.setItem("quizTheme", currentTheme);

    function initTheme() {
        const savedTheme = localStorage.getItem("quizTheme");
        setTheme(savedTheme === "light" ? "light" : "deep");
        const toggleBtn = document.getElementById("themeToggleBtn");
        if (toggleBtn) {

            });

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initQuiz() {
        unlockAudioContext();
        document.getElementById("coverPanel").style.display = "none";
        document.getElementById("quizHeader").style.display = "block";
        shuffledQuestions = shuffleArray(
            questionsData.map(q => ({
                ...q,
                options: shuffleArray([...q.options])
            }))
        );
        userAnswers = new Array(shuffledQuestions.length).fill(null);
        currentIndex = 0;
        document.getElementById("quizPanel").style.display = "block";
        document.getElementById("resultPanel").style.display = "none";
        document.getElementById("submitBtn").style.display = "none";
        document.getElementById("nextBtn").style.display = "flex";
        document.getElementById("prevBtn").style.display = "flex";
        renderQuestion();
        updateProgress();
    }

    function renderQuestion() {
        const q = shuffledQuestions[currentIndex];
        document.getElementById("questionText").innerText = q.text;
        const optsDiv = document.getElementById("optionsContainer");
        optsDiv.innerHTML = "";
        q.options.forEach((opt, idx) => {
            const optDiv = document.createElement("div");
            optDiv.className = "option";
            const stored = userAnswers[currentIndex];
            if (stored && stored.score === opt.score && stored.text === opt.text) {
                optDiv.classList.add("selected");
            }
            const prefix = String.fromCharCode(65+idx);
            optDiv.innerHTML = `<span class="option-prefix">${prefix}.</span><span>${opt.text}</span>`;
            optDiv.addEventListener("pointerenter", playOptionHoverSound);
            optDiv.addEventListener("click", () => {
                unlockAudioContext();
                playOptionClickSound();
                userAnswers[currentIndex] = { score: opt.score, dim: q.dim, text: opt.text };
                renderQuestion();
                updateProgress();
            });
            optsDiv.appendChild(optDiv);
        });
        document.getElementById("qCounter").innerText = `第${currentIndex+1} / ${shuffledQuestions.length}题`;
        if (currentIndex === shuffledQuestions.length-1) {
            document.getElementById("nextBtn").style.display = "none";
            document.getElementById("submitBtn").style.display = "block";
        } else {
            document.getElementById("nextBtn").style.display = "flex";
            document.getElementById("submitBtn").style.display = "none";
        }
    }

    function updateProgress() {
        let answered = userAnswers.filter(a => a !== null).length;
        let percent = (answered / shuffledQuestions.length) * 100;
        document.getElementById("progressBar").style.width = percent + "%";
    }

    function nextQuestion() {
        if (userAnswers[currentIndex] === null) {
            alert("请先选择一个选项～");
            return;
        }
        if (currentIndex < shuffledQuestions.length-1) {
            currentIndex++;
            renderQuestion();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    function computeResult() {
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] === null) {
                alert("请完成所有题目");
                return;
            }
        }
        const dims = ["career", "family", "children", "health"];
        let scores = { career:0, family:0, children:0, health:0 };
        const questionCountByDim = { career:0, family:0, children:0, health:0 };
        shuffledQuestions.forEach(q => {
            if (questionCountByDim[q.dim] !== undefined) {
                questionCountByDim[q.dim] += 1;
            }
        });
        // 每个维度都按原生10分制计分（不做最终总分换算）
        const pointsPerQuestion = {
            career: 10 / (questionCountByDim.career || 1),
            family: 10 / (questionCountByDim.family || 1),
            children: 10 / (questionCountByDim.children || 1),
            health: 10 / (questionCountByDim.health || 1)
        };
        for (let i = 0; i < shuffledQuestions.length; i++) {
            const q = shuffledQuestions[i];
            const ans = userAnswers[i];
            if (ans && ans.dim) {
                const fullScorePerQuestion = pointsPerQuestion[ans.dim] || 0;
                // 选项原始分值0/1/2，对应题目得分0%、50%、100%
                scores[ans.dim] += (ans.score / 2) * fullScorePerQuestion;
            }
        }
        const finalScores = {
            career: Number(scores.career.toFixed(1)),
            family: Number(scores.family.toFixed(1)),
            children: Number(scores.children.toFixed(1)),
            health: Number(scores.health.toFixed(1))
        };
        // 每个维度独立控制L/M/H区间（满分均为10）
        const levelRanges = {
            career: { lMax: 4.9, hMin: 7.0 },
            family: { lMax: 5.9, hMin: 8.0 },
            children: { lMax: 5.9, hMin: 8.0 },
            health: { lMax: 5.9, hMin: 9.0 }
        };
        const getLevelByScore = (dim, score) => {
            const cfg = levelRanges[dim];
            if (!cfg) return "M";
            if (score <= cfg.lMax) return "L";
            if (score >= cfg.hMin) return "H";
            return "M";
        };
        const userVec = {
            career: getLevelByScore("career", finalScores.career),
            family: getLevelByScore("family", finalScores.family),
            children: getLevelByScore("children", finalScores.children),
            health: getLevelByScore("health", finalScores.health)
        };
        const mapVal = { "H":2, "M":1, "L":0 };
        const userNum = [mapVal[userVec.career], mapVal[userVec.family], mapVal[userVec.children], mapVal[userVec.health]];
        let bestMatch = null;
        let bestDist = Infinity;
        for (let p of personalityList) {
            const pNum = [mapVal[p.career], mapVal[p.family], mapVal[p.children], mapVal[p.health]];
            const dist = Math.abs(userNum[0]-pNum[0]) + Math.abs(userNum[1]-pNum[1]) + Math.abs(userNum[2]-pNum[2]) + Math.abs(userNum[3]-pNum[3]);
            if (dist < bestDist) {
                bestDist = dist;
                bestMatch = p;
            }
        }
        const maxPossibleDist = 8;
        const matchPercent = (1 - bestDist / maxPossibleDist) * 100;
        if (matchPercent < 60) {
            // 兜底傻乐者
            const sillyResult = {
                name: "傻乐者",
                emoji: "😄",
                quote: "标准人格库对你的脑回路集体罢工了！",
                desc: "你的答案过于清奇，四大维度自成宇宙。人生嘛，傻乐也是顶级智慧！"
            };
            showFinalResult(sillyResult, userVec, finalScores);
        } else {
            showFinalResult(bestMatch, userVec, finalScores);
        }
    }

    function drawRoundedRect(ctx, x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + w - radius, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
        ctx.lineTo(x + w, y + h - radius);
        ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        ctx.lineTo(x + radius, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
        const chars = Array.from(text || "");
        const lines = [];
        let line = "";
        for (let i = 0; i < chars.length; i++) {
            const test = line + chars[i];
            if (ctx.measureText(test).width > maxWidth && line) {
                lines.push(line);
                line = chars[i];
                if (lines.length === maxLines - 1) {
                    break;
                }
            } else {
                line = test;
            }
        }
        if (lines.length < maxLines && line) lines.push(line);
        if (lines.length === maxLines && chars.length > lines.join("").length) {
            const last = lines[maxLines - 1];
            lines[maxLines - 1] = last.slice(0, Math.max(last.length - 1, 0)) + "…";
        }
        lines.forEach((lineText, idx) => {
            ctx.fillText(lineText, x, y + idx * lineHeight);
        });
    }

    function drawCenteredWrappedText(ctx, text, centerX, y, maxWidth, lineHeight, maxLines = 3, withEllipsis = true) {
        const chars = Array.from(text || "");
        const lines = [];
        let line = "";
        const lineLimit = Number.isFinite(maxLines) ? maxLines : Number.MAX_SAFE_INTEGER;
        for (let i = 0; i < chars.length; i++) {
            const test = line + chars[i];
            if (ctx.measureText(test).width > maxWidth && line) {
                lines.push(line);
                line = chars[i];
                if (lines.length === lineLimit - 1) break;
            } else {
                line = test;
            }
        }
        if (lines.length < lineLimit && line) lines.push(line);
        if (withEllipsis && lines.length === lineLimit && chars.length > lines.join("").length) {
            const lastIdx = lineLimit - 1;
            const last = lines[lastIdx];
            lines[lastIdx] = last.slice(0, Math.max(last.length - 1, 0)) + "…";
        }
        lines.forEach((lineText, idx) => {
            ctx.fillText(lineText, centerX, y + idx * lineHeight);
        });
        return lines.length;
    }

    function showManualDownloadLink(filename, dataUrl) {
        const panel = document.getElementById("resultPanel");
        if (!panel) return;
        let wrap = document.getElementById("shareManualDownloadWrap");
        if (!wrap) {
            wrap = document.createElement("div");
            wrap.id = "shareManualDownloadWrap";
            wrap.style.marginTop = "12px";
            wrap.style.textAlign = "center";
            panel.appendChild(wrap);
        }
        wrap.innerHTML = `
            <div style="margin-bottom:8px;font-size:0.9rem;font-weight:600;color:var(--question-color);">✅ 分享图已生成，请向下滑动查看卡片</div>
            <a id="shareManualDownloadLink" href="${dataUrl}" download="${filename}" style="display:inline-block;padding:10px 16px;border-radius:999px;border:1px solid var(--container-border);background:var(--btn-bg);color:var(--btn-text);text-decoration:none;font-weight:600;">⬇️ 点这里下载分享卡片</a>
            <div style="margin-top:10px;font-size:0.82rem;color:var(--sub-color);">手机端可长按下方图片保存</div>
            <img src="${dataUrl}" alt="分享卡片预览" style="display:block;width:100%;max-width:360px;margin:8px auto 0;border-radius:12px;border:1px solid var(--container-border);" />
        `;
        wrap.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function ensureShareLoadingOverlay() {
        let overlay = document.getElementById("shareLoadingOverlay");
        if (overlay) return overlay;
        overlay = document.createElement("div");
        overlay.id = "shareLoadingOverlay";
        overlay.className = "share-loading-overlay";
        overlay.innerHTML = `
            <div class="share-loading-box">
                <div class="share-loading-spinner"></div>
                <div class="share-loading-title">正在生成分享卡片...</div>
                <div class="share-loading-sub" id="shareLoadingSub">预计还需 12 秒</div>
            </div>
        `;
        document.body.appendChild(overlay);
        return overlay;
    }

    function setShareButtonState(isLoading) {
        const btn = document.getElementById("shareCardBtn");
        if (!btn) return;
        btn.disabled = isLoading;
        btn.classList.toggle("loading", isLoading);
        btn.innerText = isLoading ? "⏳ 生成中..." : "🖼️ 一键生成分享卡片";
    }

    function showShareLoading(seconds = 12) {
        const overlay = ensureShareLoadingOverlay();
        const sub = overlay.querySelector("#shareLoadingSub");
        let remain = seconds;
        overlay.style.display = "flex";
        if (sub) sub.innerText = `预计还需 ${remain} 秒`;
        if (shareLoadingTimer) clearInterval(shareLoadingTimer);
        shareLoadingTimer = setInterval(() => {
            remain -= 1;
            if (!sub) return;
            if (remain > 0) {
                sub.innerText = `预计还需 ${remain} 秒`;
            } else {
                sub.innerText = "处理中，请稍候...";
            }
        }, 1000);
    }

    function hideShareLoading() {
        const overlay = document.getElementById("shareLoadingOverlay");
        if (overlay) overlay.style.display = "none";
        if (shareLoadingTimer) {
            clearInterval(shareLoadingTimer);
            shareLoadingTimer = null;
        }
    }

    function loadImage(src) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error(`图片加载失败: ${src}`));
            img.src = src;
        });
    }

    function drawRadarChart(ctx, centerX, centerY, radius, scores, labels, palette) {
        const levels = 5;
        const axisCount = labels.length;
        const angleStep = (Math.PI * 2) / axisCount;
        const startAngle = -Math.PI / 2;

        for (let level = 1; level <= levels; level++) {
            const r = (radius * level) / levels;
            ctx.beginPath();
            for (let i = 0; i < axisCount; i++) {
                const angle = startAngle + i * angleStep;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.strokeStyle = palette.grid;
            ctx.lineWidth = 1.2;
            ctx.stroke();
        }

        for (let i = 0; i < axisCount; i++) {
            const angle = startAngle + i * angleStep;
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = palette.grid;
            ctx.lineWidth = 1.05;
            ctx.stroke();
        }

        ctx.beginPath();
        for (let i = 0; i < axisCount; i++) {
            const angle = startAngle + i * angleStep;
            const normalized = Math.max(0, Math.min(10, scores[i])) / 10;
            const x = centerX + Math.cos(angle) * radius * normalized;
            const y = centerY + Math.sin(angle) * radius * normalized;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = palette.dataFill;
        ctx.strokeStyle = palette.dataStroke;
        ctx.lineWidth = 2.8;
        ctx.fill();
        ctx.stroke();

        // 顶点小圆点：让雷达图更精致但不过分抢眼
        for (let i = 0; i < axisCount; i++) {
            const angle = startAngle + i * angleStep;
            const normalized = Math.max(0, Math.min(10, scores[i])) / 10;
            const x = centerX + Math.cos(angle) * radius * normalized;
            const y = centerY + Math.sin(angle) * radius * normalized;
            ctx.beginPath();
            ctx.arc(x, y, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = palette.dataStroke;
            ctx.fill();
        }

        ctx.fillStyle = palette.text;
        const radarLabelSize = palette.radarLabelSize || 30;
        ctx.font = `${radarLabelSize}px 'Microsoft YaHei', sans-serif`;
        for (let i = 0; i < axisCount; i++) {
            const angle = startAngle + i * angleStep;
            const x = centerX + Math.cos(angle) * (radius + 52);
            const y = centerY + Math.sin(angle) * (radius + 52);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(labels[i], x, y);
        }
    }

    async function downloadShareCard() {
        if (!latestResultSnapshot) return;
        const { person, finalScores } = latestResultSnapshot;
        const safeName = (person.name || "我的人格结果").replace(/[\\/:*?"<>|]/g, "_");
        const filename = `${safeName}-分享卡.png`;
        setShareButtonState(true);
        showShareLoading(4);
        try {
            const templateUrl = new URL("./分享页（小体积）.jpg", window.location.href).href;
            const templateImg = await loadImage(templateUrl);
            const canvas = document.createElement("canvas");
            canvas.width = templateImg.naturalWidth || templateImg.width;
            canvas.height = templateImg.naturalHeight || templateImg.height;
            const ctx = canvas.getContext("2d");
            if (!ctx) throw new Error("Canvas不可用");

            const baseW = 466;
            const baseH = 1000;
            const sx = canvas.width / baseW;
            const sy = canvas.height / baseH;
            const scale = Math.min(sx, sy);
            const centerX = 233 * sx;
            const contentOffsetY = 18 * sy;

            const palette = {
                text: "#2d2a67",
                sub: "#5d5a94",
                accent: "#5f49d2",
                grid: "rgba(123,95,224,0.28)",
                dataFill: "rgba(145,121,235,0.20)",
                dataStroke: "rgba(118,90,220,0.92)",
                radarLabelSize: Math.round(18 * scale)
            };

            // 1) 先画模板底图
            ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

            ctx.textAlign = "center";
            ctx.textBaseline = "alphabetic";
            // emoji 圆形底座
            const emojiY = 264 * sy + contentOffsetY;
            const emojiR = 30 * scale;
            const emojiCx = centerX;
            const emojiCy = emojiY - 16 * scale;
            const emojiBgGrad = ctx.createRadialGradient(
                emojiCx - 8 * scale,
                emojiCy - 10 * scale,
                4 * scale,
                emojiCx,
                emojiCy,
                emojiR
            );
            emojiBgGrad.addColorStop(0, "rgba(196,170,255,0.38)");
            emojiBgGrad.addColorStop(1, "rgba(110,84,198,0.24)");
            ctx.beginPath();
            ctx.arc(emojiCx, emojiCy, emojiR, 0, Math.PI * 2);
            ctx.fillStyle = emojiBgGrad;
            ctx.fill();
            ctx.strokeStyle = "rgba(109,86,194,0.45)";
            ctx.lineWidth = Math.max(1, 1.5 * scale);
            ctx.stroke();

            ctx.fillStyle = palette.text;
            ctx.font = `${Math.round(42 * scale)}px 'Segoe UI Emoji', 'Microsoft YaHei', sans-serif`;
            ctx.fillText(person.emoji || "✨", centerX, emojiY);
            ctx.font = `bold ${Math.round(42 * scale)}px 'Microsoft YaHei', sans-serif`;
            ctx.fillText(`「${person.name}」`, centerX, 330 * sy + contentOffsetY);
            ctx.fillStyle = palette.sub;
            ctx.font = `${Math.round(22 * scale)}px 'Microsoft YaHei', sans-serif`;
            const quoteX = 58 * sx;
            const quoteY = 380 * sy + contentOffsetY;
            const quoteLineHeight = 32 * sy;
            const quoteMaxLines = 4;
            const quoteBlockHeight = quoteLineHeight * quoteMaxLines;
            // quote 引言竖线
            ctx.strokeStyle = "rgba(109,86,194,0.45)";
            ctx.lineWidth = Math.max(2, 2.2 * scale);
            ctx.beginPath();
            ctx.moveTo((quoteX - 12 * sx), quoteY - 20 * sy);
            ctx.lineTo((quoteX - 12 * sx), quoteY - 20 * sy + quoteBlockHeight);
            ctx.stroke();
            ctx.textAlign = "left";
            drawWrappedText(ctx, person.quote || "", quoteX, quoteY, 350 * sx, quoteLineHeight, quoteMaxLines);
            ctx.textAlign = "center";

            const radarScores = [finalScores.career, finalScores.family, finalScores.children, finalScores.health];
            drawRadarChart(
                ctx,
                centerX,
                540 * sy + contentOffsetY,
                92 * scale,
                radarScores,
                ["事业", "家庭", "子女", "健康"],
                palette
            );

            ctx.fillStyle = palette.sub;
            ctx.font = `${Math.round(15 * scale)}px 'Microsoft YaHei', sans-serif`;
            const descStartY = 682 * sy + contentOffsetY;
            const descLineHeight = 22 * sy;
            drawCenteredWrappedText(ctx, person.desc || "", centerX, descStartY, 388 * sx, descLineHeight, 9, false);

            const dataUrl = canvas.toDataURL("image/png");

            lastShareCardDataUrl = dataUrl;
            showManualDownloadLink(filename, dataUrl);
        } catch (err) {
            console.error("生成分享卡片失败：", err);
            if (lastShareCardDataUrl) {
                showManualDownloadLink(filename, lastShareCardDataUrl);
                alert("自动下载可能被浏览器拦截，已提供手动下载按钮。");
            } else {
                alert("生成分享卡片失败，请先用浏览器通过本地服务打开页面再试。");
            }
        } finally {
            hideShareLoading();
            setShareButtonState(false);
        }
    }

    initTheme();
    document.getElementById("startBtn").addEventListener("click", initQuiz);
    document.getElementById("nextBtn").addEventListener("click", nextQuestion);
    document.getElementById("prevBtn").addEventListener("click", prevQuestion);
    document.getElementById("submitBtn").addEventListener("click", computeResult);
</script>
